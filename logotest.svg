<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --primary: #1d4ed8;
    }
    
    .neon-logo {
      stroke-dasharray: 25 75;
      animation: stroke 3s linear infinite;
      stroke: var(--primary);
      stroke-width: 12;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 6px rgba(29, 78, 216, 0.4)) drop-shadow(0 0 15px rgba(29, 78, 216, 0.2));
    }
    
    @keyframes stroke {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    
    .base-trace {
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 12;
      stroke-linecap: round;
      fill: none;
    }
    
    .glow-line {
      fill: none;
      stroke: url(#glowGradient);
      stroke-width: 1;
    }
  </style>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="#1d4ed8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0a0a0c" />
  <rect width="100%" height="100%" fill="url(#bgGradient)" opacity="0.3" />
  
  <g class="container">
    <g transform="translate(450, 150) scale(0.3)">
      <g transform="translate(-354, -252.5)">
        <!-- Base Trace -->
        <g class="base-trace">
          <path d="M505.714 173.292L174.025 505H0V331.708L331.689 0H505.714V173.292Z" />
          <path d="M570.416 329.477H397.134L533.837 192.629H708V366.664L570.416 505V329.477Z" />
        </g>
        
        <!-- Animated Neon -->
        <g class="neon-logo">
          <path d="M505.714 173.292L174.025 505H0V331.708L331.689 0H505.714V173.292Z" pathLength="100" />
          <path d="M570.416 329.477H397.134L533.837 192.629H708V366.664L570.416 505V329.477Z" pathLength="100" />
        </g>
      </g>
    </g>
    
    <line x1="384" y1="260" x2="516" y2="260" class="glow-line" />
  </g>
</svg>
